name: build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: arc-runner-set
    steps:
    - uses: actions/checkout@v3
    - run: docker build -t registry.home.dynamis.bbrfkr.net/rails-tutorial .
    - run: docker tag registry.home.dynamis.bbrfkr.net/rails-tutorial registry.home.dynamis.bbrfkr.net/rails-tutorial:${{ github.sha }}
    - run: docker push registry.home.dynamis.bbrfkr.net/rails-tutorial
    - run: docker push registry.home.dynamis.bbrfkr.net/rails-tutorial:${{ github.sha }}
  change_image_tag:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v3
      with:
        repository: bbrfkr/rails-tutorial-manifests
        ref: master
        path: rails-tutorial-manifests
    - run: sudo apt-get update && sudo apt-get install -y jq jsonnet curl
    - run: |
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update && sudo apt install gh -y
    - run: >
        cat manifests/params.libsonnet |
        jsonnet - |
        jq '.image|="registry.home.dynamis.bbrfkr.net/rails-tutorial:${{ github.sha }}"' |
        jsonnetfmt - > manifests/params.libsonnet
      working-directory: rails-tutorial-manifests
    - id: generate_token
      uses: tibdex/github-app-token@b62528385c34dbc9f38e5f4225ac829252d1ea92
      with:
        app_id: ${{ secrets.APP_ID }}
        private_key: ${{ secrets.APP_PRIVATE_KEY }}
        repository: bbrfkr/rails-tutorial-manifests
    - run: |
        GIT_DIFF=$(git diff --name-only)
        if [ -z "$GIT_DIFF" ]; then
          echo "nothing to do."
        else
          git config --unset-all http.https://github.com/.extraheader
          git remote add from-actions https://github-actions:${GITHUB_TOKEN}@github.com/bbrfkr/rails-tutorial-manifests
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git checkout -b from-rails-tutorial-${{ github.sha }} &&
          git add .
          git commit -m "Update image tag to ${{ github.sha }}" &&
          git push from-actions from-rails-tutorial-${{ github.sha }} &&
          gh pr create --base master --head from-rails-tutorial-${{ github.sha }} --title "from rails-tutorial: sha=${{ github.sha }}" --body ""
        fi
      working-directory: rails-tutorial-manifests
      env:
        GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
